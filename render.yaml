services:
  - type: web
    name: zenskar-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: MCP_TRANSPORT=sse python -m mcp_server.server
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: MCP_TRANSPORT
        value: sse
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GSC_SITE_URL
        value: "https://www.zenskar.com/"
      - key: GA4_PROPERTY_ID
        sync: false
      - key: ADS_CUSTOMER_ID
        sync: false
      - key: ADS_DEV_TOKEN
        sync: false
      - key: ADS_TOKEN_JSON
        sync: false
      - key: HUBSPOT_PAT
        sync: false
      - key: BING_API_KEY
        sync: false
    plan: free
